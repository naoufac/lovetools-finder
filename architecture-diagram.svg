<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0l10 5-10 5Z" fill="#d4a843"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0l10 5-10 5Z" fill="#9e9a94"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#e6b84f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="820" fill="url(#bg-grad)" rx="12"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#d4a843" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" letter-spacing="1">LoveTools Finder — PWA Architecture</text>

  <!-- ============================================================ -->
  <!-- SECTION 1: PWA LAYER -->
  <!-- ============================================================ -->

  <rect x="30" y="60" width="940" height="120" rx="10" fill="#2a2a2a" stroke="#d4a843" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="50" y="82" fill="#d4a843" font-size="12" font-weight="600" letter-spacing="1.5" text-transform="uppercase">PWA LAYER</text>

  <!-- Manifest box -->
  <rect x="60" y="95" width="200" height="60" rx="6" fill="#222" stroke="rgba(212,168,67,0.3)" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="120" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">manifest.json</text>
  <text x="160" y="138" text-anchor="middle" fill="#9e9a94" font-size="11">display: standalone</text>

  <!-- SW box -->
  <rect x="290" y="95" width="200" height="60" rx="6" fill="#222" stroke="rgba(212,168,67,0.3)" stroke-width="1" filter="url(#shadow)"/>
  <text x="390" y="120" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">sw.js (Service Worker)</text>
  <text x="390" y="138" text-anchor="middle" fill="#9e9a94" font-size="11">CacheFirst + NetworkFirst</text>

  <!-- Cache box -->
  <rect x="520" y="95" width="200" height="60" rx="6" fill="#222" stroke="rgba(212,168,67,0.3)" stroke-width="1" filter="url(#shadow)"/>
  <text x="620" y="120" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">Cache Storage API</text>
  <text x="620" y="138" text-anchor="middle" fill="#9e9a94" font-size="11">lovetools-v1 / api / fonts</text>

  <!-- Offline banner -->
  <rect x="750" y="95" width="200" height="60" rx="6" fill="#222" stroke="rgba(212,168,67,0.3)" stroke-width="1" filter="url(#shadow)"/>
  <text x="850" y="117" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">🌐 Offline Fallback</text>
  <text x="850" y="137" text-anchor="middle" fill="#9e9a94" font-size="11">Graceful degradation</text>

  <!-- Arrow: manifest + SW together enable offline -->
  <line x1="490" y1="125" x2="520" y2="125" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrow)" stroke-opacity="0.6"/>

  <!-- ============================================================ -->
  <!-- SECTION 2: COMPONENT ARCHITECTURE -->
  <!-- ============================================================ -->

  <rect x="30" y="200" width="940" height="340" rx="10" fill="#2a2a2a" stroke="#d4a843" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="50" y="222" fill="#d4a843" font-size="12" font-weight="600" letter-spacing="1.5" text-transform="uppercase">COMPONENT ARCHITECTURE</text>

  <!-- Column 1: Presentation Layer -->
  <rect x="55" y="240" width="280" height="280" rx="8" fill="rgba(212,168,67,0.06)" stroke="rgba(212,168,67,0.15)" stroke-width="1"/>
  <text x="195" y="262" text-anchor="middle" fill="#d4a843" font-size="12" font-weight="600">🎨 PRESENTATION LAYER</text>

  <!-- HTML Shell -->
  <rect x="75" y="280" width="240" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="195" y="303" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">index.html</text>
  <text x="195" y="318" text-anchor="middle" fill="#9e9a94" font-size="11">App shell · SW registration · Fonts</text>

  <!-- CSS -->
  <rect x="75" y="340" width="240" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="195" y="363" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">styles.css</text>
  <text x="195" y="378" text-anchor="middle" fill="#9e9a94" font-size="11">Custom properties · Grid · Flexbox · RWD</text>

  <!-- Bottom Nav -->
  <rect x="75" y="400" width="240" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="195" y="423" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">bottom-nav</text>
  <text x="195" y="438" text-anchor="middle" fill="#9e9a94" font-size="11">Home · Search · Favorites</text>

  <!-- Arrow from HTML to CSS -->
  <line x1="195" y1="330" x2="195" y2="338" stroke="#9e9a94" stroke-width="1" marker-end="url(#arrow-muted)"/>

  <!-- Column 2: Application Layer -->
  <rect x="355" y="240" width="280" height="280" rx="8" fill="rgba(212,168,67,0.06)" stroke="rgba(212,168,67,0.15)" stroke-width="1"/>
  <text x="495" y="262" text-anchor="middle" fill="#d4a843" font-size="12" font-weight="600">⚙️ APPLICATION LAYER</text>

  <!-- Router -->
  <rect x="375" y="280" width="240" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="495" y="303" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">router.js</text>
  <text x="495" y="318" text-anchor="middle" fill="#9e9a94" font-size="11">Hash-based SPA · View mapping</text>

  <!-- app.js -->
  <rect x="375" y="340" width="240" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="495" y="363" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">app.js</text>
  <text x="495" y="378" text-anchor="middle" fill="#9e9a94" font-size="11">Bootstrap · Init router · Mount views</text>

  <!-- Views -->
  <rect x="375" y="400" width="240" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="495" y="418" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">views/</text>
  <text x="495" y="436" text-anchor="middle" fill="#9e9a94" font-size="11">home.js · category.js · tool-detail.js</text>

  <!-- Arrow router → app.js -->
  <line x1="495" y1="330" x2="495" y2="338" stroke="#9e9a94" stroke-width="1" marker-end="url(#arrow-muted)"/>

  <!-- Column 3: Data Layer -->
  <rect x="655" y="240" width="290" height="280" rx="8" fill="rgba(212,168,67,0.06)" stroke="rgba(212,168,67,0.15)" stroke-width="1"/>
  <text x="800" y="262" text-anchor="middle" fill="#d4a843" font-size="12" font-weight="600">🗄️ DATA LAYER</text>

  <!-- API Facade -->
  <rect x="680" y="280" width="240" height="50" rx="6" fill="#222" stroke="#d4a843" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="303" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">api.js (Facade)</text>
  <text x="800" y="318" text-anchor="middle" fill="#9e9a94" font-size="11">getCategories · getTools · searchTools</text>

  <!-- Mock adapter -->
  <rect x="680" y="340" width="115" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="737" y="363" text-anchor="middle" fill="#e8e4de" font-size="12" font-weight="600">api.mocks.js</text>
  <text x="737" y="379" text-anchor="middle" fill="#9e9a94" font-size="10">18 mock tools</text>

  <!-- HTTP adapter -->
  <rect x="805" y="340" width="115" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="862" y="363" text-anchor="middle" fill="#e8e4de" font-size="12" font-weight="600">api.http.js</text>
  <text x="862" y="379" text-anchor="middle" fill="#9e9a94" font-size="10">REST endpoint</text>

  <!-- Data types -->
  <rect x="680" y="400" width="240" height="50" rx="6" fill="#222" stroke="rgba(212,168,67,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="800" y="420" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">Data Model</text>
  <text x="800" y="438" text-anchor="middle" fill="#9e9a94" font-size="11">Tool · Category · Rating</text>

  <!-- Arrows between adapters -->
  <line x1="795" y1="365" x2="803" y2="365" stroke="#9e9a94" stroke-width="1" marker-end="url(#arrow-muted)"/>

  <!-- Cross-column data flow arrows -->
  <path d="M315,305 L355,305" stroke="#d4a843" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-opacity="0.5"/>
  <text x="335" y="298" text-anchor="middle" fill="#9e9a94" font-size="9">injects</text>

  <path d="M615,305 L655,305" stroke="#d4a843" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-opacity="0.5"/>
  <text x="635" y="298" text-anchor="middle" fill="#9e9a94" font-size="9">calls</text>

  <path d="M800,450 L800,490" stroke="#d4a843" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- SECTION 3: DATA FLOW -->
  <!-- ============================================================ -->

  <rect x="30" y="560" width="940" height="105" rx="10" fill="#2a2a2a" stroke="#d4a843" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="50" y="582" fill="#d4a843" font-size="12" font-weight="600" letter-spacing="1.5" text-transform="uppercase">DATA FLOW</text>

  <!-- Flow boxes -->
  <rect x="55" y="598" width="120" height="44" rx="20" fill="#d4a843" filter="url(#shadow)"/>
  <text x="115" y="625" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="700">User Action</text>

  <line x1="175" y1="620" x2="205" y2="620" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="215" y="598" width="110" height="44" rx="6" fill="#222" stroke="rgba(212,168,67,0.4)" stroke-width="1" filter="url(#shadow)"/>
  <text x="270" y="618" text-anchor="middle" fill="#e8e4de" font-size="12" font-weight="600">Hash Change</text>
  <text x="270" y="632" text-anchor="middle" fill="#9e9a94" font-size="10">location.hash</text>

  <line x1="325" y1="620" x2="355" y2="620" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="365" y="598" width="110" height="44" rx="6" fill="#222" stroke="rgba(212,168,67,0.4)" stroke-width="1" filter="url(#shadow)"/>
  <text x="420" y="618" text-anchor="middle" fill="#e8e4de" font-size="12" font-weight="600">Router Match</text>
  <text x="420" y="632" text-anchor="middle" fill="#9e9a94" font-size="10">{ view, params }</text>

  <line x1="475" y1="620" x2="505" y2="620" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="515" y="598" width="100" height="44" rx="6" fill="#222" stroke="rgba(212,168,67,0.4)" stroke-width="1" filter="url(#shadow)"/>
  <text x="565" y="618" text-anchor="middle" fill="#e8e4de" font-size="12" font-weight="600">View Render</text>
  <text x="565" y="632" text-anchor="middle" fill="#9e9a94" font-size="10">call api.*</text>

  <line x1="615" y1="620" x2="645" y2="620" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="655" y="598" width="110" height="44" rx="6" fill="#222" stroke="rgba(212,168,67,0.4)" stroke-width="1" filter="url(#shadow)"/>
  <text x="710" y="618" text-anchor="middle" fill="#e8e4de" font-size="12" font-weight="600">API Fetch</text>
  <text x="710" y="632" text-anchor="middle" fill="#9e9a94" font-size="10">GET /api/tools</text>

  <line x1="765" y1="620" x2="795" y2="620" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="805" y="598" width="140" height="44" rx="20" fill="#d4a843" filter="url(#shadow)"/>
  <text x="875" y="618" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="700">DOM Paint ✅</text>
  <text x="875" y="633" text-anchor="middle" fill="#3a2a0a" font-size="10">innerHTML / append</text>

  <!-- ============================================================ -->
  <!-- SECTION 4: ROUTE MAP -->
  <!-- ============================================================ -->

  <rect x="30" y="685" width="940" height="110" rx="10" fill="#2a2a2a" stroke="#d4a843" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="50" y="707" fill="#d4a843" font-size="12" font-weight="600" letter-spacing="1.5" text-transform="uppercase">ROUTE MAP</text>

  <!-- Route: Home -->
  <rect x="60" y="725" width="170" height="50" rx="8" fill="#222" stroke="#d4a843" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="748" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">🏠 #home</text>
  <text x="145" y="764" text-anchor="middle" fill="#9e9a94" font-size="11">HomeView · Category Grid</text>

  <line x1="230" y1="750" x2="270" y2="750" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="742" text-anchor="middle" fill="#9e9a94" font-size="10">click card</text>

  <!-- Route: Category -->
  <rect x="280" y="725" width="200" height="50" rx="8" fill="#222" stroke="#d4a843" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="748" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">📂 #category/{id}</text>
  <text x="380" y="764" text-anchor="middle" fill="#9e9a94" font-size="11">CategoryView · Tool Listing</text>

  <line x1="480" y1="750" x2="520" y2="750" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="742" text-anchor="middle" fill="#9e9a94" font-size="10">click tool</text>

  <!-- Route: Tool Detail -->
  <rect x="530" y="725" width="200" height="50" rx="8" fill="#222" stroke="#d4a843" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="630" y="748" text-anchor="middle" fill="#e8e4de" font-size="13" font-weight="600">🔧 #tool/{id}</text>
  <text x="630" y="764" text-anchor="middle" fill="#9e9a94" font-size="11">ToolDetailView · Modal</text>

  <!-- Back arrow (dashed) -->
  <path d="M530,740 Q500,710 380,710 Q260,710 230,740" stroke="#9e9a94" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-muted)"/>
  <text x="380" y="708" text-anchor="middle" fill="#9e9a94" font-size="10">← back</text>

  <!-- External link from tool detail -->
  <line x1="730" y1="750" x2="770" y2="750" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="780" y="732" width="170" height="40" rx="20" fill="rgba(212,168,67,0.12)" stroke="#d4a843" stroke-width="1"/>
  <text x="865" y="757" text-anchor="middle" fill="#d4a843" font-size="12" font-weight="600">🌐 Visit Tool ↗</text>

  <!-- Legend -->
  <text x="60" y="795" fill="#9e9a94" font-size="10">Responsive breakpoints: 320px (base) · 480 · 768 · 1024px (desktop)</text>
  <text x="60" y="808" fill="#9e9a94" font-size="10">Service worker: sw.js registers on load · precaches shell · CacheFirst for assets · NetworkFirst for API</text>
</svg>
